<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 100 100" fill="none">
  <defs>
    <linearGradient id="campusGrad" x1="0%" y1="0%" x2="100%" y2="100%">
      <stop offset="0%" style="stop-color:#10b981"/>
      <stop offset="100%" style="stop-color:#14b8a6"/>
    </linearGradient>
    <linearGradient id="bookGrad" x1="0%" y1="0%" x2="100%" y2="100%">
      <stop offset="0%" style="stop-color:#ffffff"/>
      <stop offset="100%" style="stop-color:#e5e7eb"/>
    </linearGradient>
  </defs>

  <!-- Background Circle -->
  <circle cx="50" cy="50" r="48" fill="url(#campusGrad)"/>

  <!-- Graduation Cap -->
  <g transform="translate(50, 35)">
    <!-- Cap top (mortarboard) -->
    <polygon points="-25,5 0,-10 25,5 0,10" fill="url(#bookGrad)" opacity="0.95"/>
    <!-- Cap base -->
    <ellipse cx="0" cy="10" rx="12" ry="4" fill="#d1d5db"/>
    <!-- Tassel -->
    <line x1="15" y1="3" x2="22" y2="15" stroke="#fcd34d" stroke-width="2" stroke-linecap="round"/>
    <circle cx="22" cy="17" r="3" fill="#fcd34d"/>
  </g>

  <!-- Open Book -->
  <g transform="translate(50, 60)">
    <!-- Left page -->
    <path d="M-2,0 Q-15,-3 -22,5 L-22,18 Q-15,12 -2,15 Z" fill="url(#bookGrad)" opacity="0.95"/>
    <!-- Right page -->
    <path d="M2,0 Q15,-3 22,5 L22,18 Q15,12 2,15 Z" fill="url(#bookGrad)" opacity="0.95"/>
    <!-- Book lines -->
    <line x1="-18" y1="7" x2="-6" y2="5" stroke="#9ca3af" stroke-width="1"/>
    <line x1="-17" y1="11" x2="-6" y2="9" stroke="#9ca3af" stroke-width="1"/>
    <line x1="18" y1="7" x2="6" y2="5" stroke="#9ca3af" stroke-width="1"/>
    <line x1="17" y1="11" x2="6" y2="9" stroke="#9ca3af" stroke-width="1"/>
    <!-- Spine -->
    <line x1="0" y1="0" x2="0" y2="15" stroke="#9ca3af" stroke-width="1"/>
  </g>

  <!-- AI Sparkles -->
  <g fill="#fcd34d">
    <circle cx="20" cy="25" r="2"/>
    <circle cx="80" cy="30" r="1.5"/>
    <circle cx="25" cy="75" r="1.5"/>
    <circle cx="75" cy="70" r="2"/>
  </g>
</svg>