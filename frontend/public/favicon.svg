<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 100 100" fill="none">
  <defs>
    <linearGradient id="grad" x1="0%" y1="0%" x2="100%" y2="100%">
      <stop offset="0%" style="stop-color:#10b981"/>
      <stop offset="100%" style="stop-color:#14b8a6"/>
    </linearGradient>
  </defs>

  <!-- Background -->
  <rect width="100" height="100" rx="20" fill="url(#grad)"/>

  <!-- Graduation Cap -->
  <g transform="translate(50, 35)">
    <polygon points="-28,5 0,-12 28,5 0,12" fill="white" opacity="0.95"/>
    <ellipse cx="0" cy="12" rx="12" ry="4" fill="#d1d5db"/>
    <line x1="18" y1="3" x2="26" y2="18" stroke="#fcd34d" stroke-width="3" stroke-linecap="round"/>
    <circle cx="26" cy="21" r="4" fill="#fcd34d"/>
  </g>

  <!-- Book -->
  <g transform="translate(50, 65)">
    <path d="M-2,0 Q-18,-4 -26,6 L-26,22 Q-18,14 -2,18 Z" fill="white" opacity="0.95"/>
    <path d="M2,0 Q18,-4 26,6 L26,22 Q18,14 2,18 Z" fill="white" opacity="0.95"/>
    <line x1="0" y1="0" x2="0" y2="18" stroke="#9ca3af" stroke-width="2"/>
  </g>
</svg>
